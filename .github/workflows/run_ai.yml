name: Run DG-AI Script

on:
  workflow_dispatch: # बटन दबाकर खुद चलाने के लिए
  schedule:
    - cron: '0 3 * * *' # रोज़ सुबह खुद-ब-खुद चलने के लिए (UTC Time)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Run Main Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
        
        
